<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Balqees ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(-45deg, #ff9a9e, #fecfef, #ffdde1, #f48fb1);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: #333;
            position: relative;
            text-align: center;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* ستايل القلوب والورود المتساقطة في الخلفية */
        .falling-element {
            position: absolute;
            top: -10%;
            z-index: 0;
            user-select: none;
            pointer-events: none;
            animation: fall linear forwards;
        }

        @keyframes fall {
            0% { transform: translateY(0) rotate(0deg) scale(1); opacity: 0.8; }
            100% { transform: translateY(110vh) rotate(360deg) scale(1.5); opacity: 0; }
        }

        /* تأثير الزجاج الشفاف الفخم للصندوق */
        .container {
            background: rgba(255, 255, 255, 0.65);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 40px 30px;
            border-radius: 25px;
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 20px 50px rgba(216, 27, 96, 0.2);
            width: 90%;
            max-width: 400px;
            position: relative;
            z-index: 10;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .container:hover {
            transform: translateY(-5px);
            box-shadow: 0 25px 60px rgba(216, 27, 96, 0.3);
        }

        .page {
            display: none;
            animation: fadeInScale 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .page.active {
            display: block;
        }

        .cursive-title {
            font-family: 'Dancing Script', cursive;
            font-size: 45px;
            color: #d81b60;
            margin-bottom: 15px;
            margin-top: 0;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.05);
        }

        p {
            font-size: 18px;
            color: #444;
            margin-bottom: 25px;
            line-height: 1.5;
            min-height: 27px; /* لحجز المساحة أثناء تأثير الكتابة */
        }

        .btn {
            background: linear-gradient(45deg, #ff4081, #d81b60);
            color: white;
            border: none;
            padding: 12px 28px;
            font-size: 18px;
            border-radius: 30px;
            cursor: pointer;
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            transition: all 0.3s;
            margin: 10px;
            box-shadow: 0 4px 15px rgba(216, 27, 96, 0.3);
            width: 80%;
            max-width: 250px;
            position: relative;
            outline: none;
        }

        .btn-pulse {
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(216, 27, 96, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(216, 27, 96, 0); }
            100% { box-shadow: 0 0 0 0 rgba(216, 27, 96, 0); }
        }

        .btn:hover {
            transform: scale(1.08) translateY(-3px);
            box-shadow: 0 8px 25px rgba(216, 27, 96, 0.6);
        }

        #no-btn {
            background: #9e9e9e;
            box-shadow: none;
            position: absolute;
            width: auto;
            padding: 12px 28px;
            animation: none;
        }

        .vertical-buttons {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .results-card {
            background: rgba(255, 255, 255, 0.9);
            border-radius: 15px;
            padding: 20px;
            text-align: left;
            margin-top: 20px;
            border: 2px dashed #f48fb1;
            box-shadow: inset 0 0 10px rgba(244, 143, 177, 0.2);
        }

        .results-card p {
            margin: 12px 0;
            font-size: 16px;
            color: #333;
            border-bottom: 1px solid #f8bbd0;
            padding-bottom: 8px;
            opacity: 0;
            animation: slideInRight 0.5s forwards;
        }

        .results-card p:nth-child(1) { animation-delay: 0.3s; }
        .results-card p:nth-child(2) { animation-delay: 0.8s; }
        .results-card p:nth-child(3) { animation-delay: 1.3s; }
        .results-card p:nth-child(4) { animation-delay: 1.8s; }
        .results-card p:nth-child(5) { animation-delay: 2.3s; border-bottom: none; }

        .results-card strong {
            color: #d81b60;
            display: inline-block;
            width: 130px;
        }

        .success-title {
            color: #2e7d32;
            font-size: 26px;
            font-weight: bold;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.05);
        }

        @keyframes fadeInScale {
            0% { opacity: 0; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1); }
        }

        @keyframes slideInRight {
            0% { opacity: 0; transform: translateX(-30px); }
            100% { opacity: 1; transform: translateX(0); }
        }
    </style>
</head>
<body>

    <div id="youtube-player" style="display: none;"></div>

    <div class="container">
        
        <div id="page1" class="page active">
            <h1 class="cursive-title">Hey Balqees,</h1>
            <p id="typewriter-text"></p>
            <button class="btn btn-pulse" onclick="startExperience()">Open ✨</button>
        </div>

        <div id="page2" class="page">
            <h1 class="cursive-title">Are you ready?</h1>
            <div style="position: relative; height: 120px; display: flex; justify-content: center; align-items: center;">
                <button class="btn btn-pulse" style="width: auto;" onclick="nextPage('page3')">Yes</button>
                <button class="btn" id="no-btn">No</button>
            </div>
        </div>

        <div id="page3" class="page">
            <h1 class="cursive-title" style="font-size: 36px;">How awesome are you?</h1>
            <div class="vertical-buttons">
                <button class="btn" onclick="nextPage('page4')">10/10</button>
                <button class="btn" onclick="nextPage('page4')">100/10</button>
                <button class="btn btn-pulse" onclick="nextPage('page4')">Infinity ♾️</button>
            </div>
        </div>

            <p style="font-size: 16px; color: #880e4f; font-weight: 60
