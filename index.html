<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Balqees AI Detector</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0d1117;
color:#00ff88;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
}

.container{
text-align:center;
padding:30px;
max-width:700px;
}

h1{
font-size:3rem;
margin-bottom:20px;
}

input{
width:300px;
padding:15px;
border:none;
border-radius:10px;
font-size:18px;
margin-top:15px;
}

button{
margin-top:20px;
padding:15px 35px;
border:none;
border-radius:10px;
font-size:18px;
cursor:pointer;
background:#00ff88;
color:#000;
font-weight:bold;
}

.result{
display:none;
margin-top:30px;
}

.loading{
display:none;
font-size:22px;
margin-top:20px;
}

.glow{
animation:glow 1.5s infinite alternate;
}

@keyframes glow{
from{
text-shadow:0 0 10px #00ff88;
}
to{
text-shadow:0 0 30px #00ff88;
}
}
</style>
</head>

<body>

<div class="container">

<h1 class="glow">🤖 Balqees AI Detector</h1>

<div id="start">

<p>Enter your name to begin scanning...</p>

<input id="name" placeholder="Your Name">

<br>

<button onclick="scan()">Start Scan</button>

</div>

<div class="loading" id="loading">
Analyzing beauty level...<br><br>
Scanning database...<br><br>
Please wait...
</div>

<div class="result" id="result">

<h2>🚨 SYSTEM OVERLOAD 🚨</h2>

<br>

<h1>Balqees Detected 💖</h1>

<br>

<p>
Beauty Level: ∞
</p>

<br>

<p>
Rank: #1 In The Universe 🌎
</p>

<br>

<p>
Threat Level: Too Adorable ⚠️
</p>

<br>

<h2>
Official Score: ∞ / 10
</h2>

</div>

</div>

<script>

function scan(){

let name=document.getElementById("name").value;

if(name.trim()==""){
alert("Enter a name first");
return;
}

document.getElementById("start").style.display="none";
document.getElementById("loading").style.display="block";

setTimeout(()=>{

document.getElementById("loading").style.display="none";
document.getElementById("result").style.display="block";

},3000);

}

</script>

</body>
</html>
